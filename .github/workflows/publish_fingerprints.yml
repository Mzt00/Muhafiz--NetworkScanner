name: Publish fingerprints

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    name: Build and release fingerprints.json
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'sig-candidate')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bump fingerprint version
        id: version
        run: |
          python - <<'EOF'
          import json, datetime, pathlib

          fp = pathlib.Path("analysis/fingerprints.json")
          data = json.loads(fp.read_text())

          # bump patch version
          parts = data["meta"]["version"].split(".")
          parts[2] = str(int(parts[2]) + 1)
          data["meta"]["version"] = ".".join(parts)
          data["meta"]["total_signatures"] = len(data["signatures"])
          data["meta"]["updated_at"] = datetime.datetime.utcnow().isoformat() + "Z"

          fp.write_text(json.dumps(data, indent=2))
          print(f"::set-output name=version::{data['meta']['version']}")
          EOF

      - name: Commit updated fingerprints.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis/fingerprints.json
          git commit -m "release: fingerprints.json v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "fingerprints-v${{ steps.version.outputs.version }}"
          name: "Fingerprints v${{ steps.version.outputs.version }}"
          body: "Updated community fingerprint database. See analysis/fingerprints.json for full signature list."
          files: analysis/fingerprints.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}